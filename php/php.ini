; PHP конфигурация для увеличения лимитов загрузки файлов
; Этот файл подключается к WordPress контейнеру

; Максимальный размер загружаемого файла
upload_max_filesize = 64M

; Максимальный размер POST данных (должен быть >= upload_max_filesize)
post_max_size = 64M

; Максимальное время выполнения скрипта (в секундах)
max_execution_time = 300

; Максимальное время парсинга входных данных
max_input_time = 300

; Лимит памяти для скриптов
memory_limit = 256M

; Максимальное количество загружаемых файлов одновременно
max_file_uploads = 20

