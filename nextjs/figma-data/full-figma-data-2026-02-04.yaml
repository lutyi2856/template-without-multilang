                      внимательный, добрый, отзывчивый и заботливый доктор,
                      находит подход к каждому пациенту. Приемы проходят без
                      боли и дискомфорта. Постоянно совершенствует свои знания и
                      навыки на различных курсах, учебах, читает и изучает
                      современную литературу.
